<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jenny's Corner · 慧盈财富</title>
</head>
<body style="margin:0;padding:0;background:#f0f4f8;font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4f8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="620" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- ===== HEADER ===== -->
          <tr>
            <td style="background:linear-gradient(135deg,#1e1b4b 0%,#3730a3 60%,#4f46e5 100%);padding:0;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:16px 40px 0 40px;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="vertical-align:middle;">
                          <table cellpadding="0" cellspacing="0">
                            <tr>
                              <td style="background:rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;vertical-align:middle;">
                                <span style="color:#e8b400;font-size:15px;font-weight:900;letter-spacing:1px;">wisewin.ca</span>
                                <span style="color:#ffffff;font-size:13px;font-weight:600;margin-left:8px;vertical-align:middle;">慧盈财富</span>
                              </td>
                            </tr>
                          </table>
                        </td>
                        <td align="right" style="vertical-align:middle;">
                          <span style="color:rgba(255,255,255,0.7);font-size:12px;">{{ISSUE_DATE}}</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td style="padding:28px 40px 32px 40px;">
                    <div style="color:rgba(255,255,255,0.6);font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;">Jenny's Corner</div>
                    <h1 style="color:#ffffff;font-size:28px;font-weight:700;margin:0 0 8px 0;line-height:1.3;">{{TITLE}}</h1>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:12px;">
                      <div style="width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;">👩</div>
                      <span style="color:#c7d2fe;font-size:14px;">Jenny Zheng · 慧盈财富创始人</span>
                    </div>
                  </td>
                </tr>
                <tr>
                  <td style="background:#e8b400;height:4px;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ===== BODY ===== -->
          <tr>
            <td style="padding:40px;">
              {{BODY_CONTENT}}
            </td>
          </tr>

          <!-- ===== FOOTER ===== -->
          <tr>
            <td style="background:#1e1b4b;padding:24px 40px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <div style="color:#e8b400;font-weight:700;font-size:15px;margin-bottom:4px;">wisewin.ca · 慧盈财富</div>
                    <div style="color:rgba(255,255,255,0.5);font-size:11px;">
                      您收到此邮件是因为您订阅了
                      <a href="https://newsletter.wisewin.ca" style="color:#a5b4fc;">newsletter.wisewin.ca</a>
                    </div>
                  </td>
                  <td align="right" style="vertical-align:middle;">
                    <a href="{{MANAGE_URL}}" style="color:#a5b4fc;font-size:11px;margin-right:10px;">管理订阅</a>
                    <a href="{{UNSUBSCRIBE_URL}}" style="color:rgba(255,255,255,0.4);font-size:11px;text-decoration:underline;">取消订阅</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
