# News items
news1_title: 美国对等关税重创全球市场
news1_content: 特朗普政府宣布对多国加征对等关税，引发全球股市剧烈震荡，道指单日跌逾1500点，创2020年以来最大单日跌幅。加拿大出口行业面临直接冲击。

news2_title: 加拿大央行3月维持利率不变
news2_content: 加拿大央行在3月利率决议中维持基准利率2.75%不变，行长麦克勒姆表示，关税不确定性是主要顾虑，央行将密切观察贸易局势演变再做决策。

news3_title: 加元跌破0.70美元关口
news3_content: 受关税冲击及油价下跌双重压力，加元本周一度跌破0.70美元，为近五年低位。分析人士指出，若贸易战持续升级，加元或面临进一步贬值压力。

