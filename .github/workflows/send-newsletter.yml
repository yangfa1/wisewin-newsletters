name: Send Newsletter

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new HTML files
        id: detect
        run: |
          # Get list of new .html files added in this push
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '*.html' | grep -E '^[^/]+/[0-9]{4}-[0-9]{2}-[0-9]{2}\.html$' || true)
          echo "New files: $NEW_FILES"
          if [ -z "$NEW_FILES" ]; then
            echo "No new newsletter files detected. Skipping."
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Send newsletters
        if: steps.detect.outputs.has_files == 'true'
        env:
          NEWSLETTER_SEND_TOKEN: ${{ secrets.NEWSLETTER_SEND_TOKEN }}
          VERCEL_URL: https://newsletter.wisewin.ca
        run: |
          echo "${{ steps.detect.outputs.files }}" | while IFS= read -r file; do
            if [ -z "$file" ]; then continue; fi

            echo "Processing: $file"

            # Extract folder name (newsletter type) and filename
            FOLDER=$(dirname "$file")
            FILENAME=$(basename "$file" .html)

            # Read HTML content
            HTML=$(cat "$file")

            # Call Vercel API
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$VERCEL_URL/api/send-newsletter" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $NEWSLETTER_SEND_TOKEN" \
              -d "{
                \"folder_name\": \"$FOLDER\",
                \"date\": \"$FILENAME\",
                \"html\": $(echo "$HTML" | jq -Rs .)
              }")

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            echo "Response ($HTTP_CODE): $BODY"

            if [ "$HTTP_CODE" = "404" ]; then
              echo "⚠️ Newsletter type not found for $file - skipping (not in newsletter_types DB)"
            elif [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Failed to send newsletter for $file (HTTP $HTTP_CODE)"
              exit 1
            else
              echo "✅ Newsletter sent successfully for $file"
            fi
          done
